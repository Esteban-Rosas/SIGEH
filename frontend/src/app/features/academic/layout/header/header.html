<header class="header">
  <!-- Izquierda: botón de menú + fecha -->
  <div class="header-izq">
    <div class="header-fecha">
      <i class="material-icons-round header-icono-fecha">calendar_today</i>
      {{ fechaHoy }}
    </div>
  </div>

  <!-- Derecha: notificaciones + perfil -->
  <div class="header-der">
    <!-- Notificaciones -->
    <button class="header-btn" title="Notificaciones">
      <i class="material-icons-round">notifications</i>
      <span class="header-badge" *ngIf="notificaciones === 0 ? false : true">10</span>
    </button>

    <!-- Perfil usuario -->
    <div class="header-perfil" (click)="toggleMenuUsuario()">
      <div class="header-avatar">
        {{ iniciales }}
      </div>
      <div class="header-info">
        <span class="header-nombre">{{ usuario.nombre }} {{ usuario.apellido }}</span>
        <span class="header-rol">{{ usuario.rol }}</span>
      </div>
      <i class="material-icons-round header-chevron">expand_more</i>
    </div>

    <!-- Menú desplegable animado -->
    <div class="header-dropdown" *ngIf="menuUsuarioAbierto">
      <a routerLink="/sistema/configuracion" class="dropdown-item">
        <i class="material-icons-round">settings</i>
        Configuración
      </a>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item dropdown-logout">
        <i class="material-icons-round">logout</i>
        Cerrar sesión
      </button>
    </div>
  </div>
</header>
